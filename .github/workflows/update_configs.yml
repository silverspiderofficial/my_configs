name: 'Auto Collect Multi-Protocol Configs'

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch from all sources
        run: |
          echo "" > all_configs.txt
          for url in \
            "https://raw.githubusercontent.com/Epodonios/v2ray-configs/main/Splitted-By-Protocol/vless.txt" \
            "https://raw.githubusercontent.com/Epodonios/v2ray-configs/main/Splitted-By-Protocol/vmess.txt" \
            "https://raw.githubusercontent.com/Epodonios/v2ray-configs/main/Splitted-By-Protocol/trojan.txt" \
            "https://raw.githubusercontent.com/ebrasha/free-v2ray-public-list/refs/heads/main/vless_configs.txt" \
            "https://raw.githubusercontent.com/Farid-Karimi/Config-Collector/main/vless_iran.txt" \
            "https://raw.githubusercontent.com/MahanKenway/Freedom-V2Ray/main/configs/vless.txt" \
            "https://raw.githubusercontent.com/MahanKenway/Freedom-V2Ray/main/configs/vmess.txt" \
            "https://raw.githubusercontent.com/tepo80/v2rayNG_-/main/vless.txt" \
            "https://raw.githubusercontent.com/tepo80/v2rayNG_-/main/vmess.txt" \
            "https://raw.githubusercontent.com/DukeMehdi/FreeList-V2ray-Configs/main/vless.txt" \
            "https://raw.githubusercontent.com/DukeMehdi/FreeList-V2ray-Configs/main/vmess.txt" \
            "https://raw.githubusercontent.com/arshiafarzi/free-v2ray-config/main/vless.txt" \
            "https://raw.githubusercontent.com/arshiafarzi/free-v2ray-config/main/vmess.txt" \
            "https://raw.githubusercontent.com/coldwater-10/V2ray-Config/main/vless.txt" \
            "https://raw.githubusercontent.com/soroushmirzaei/telegram-configs-collector/main/vless.txt" \
            "https://raw.githubusercontent.com/soroushmirzaei/telegram-configs-collector/main/vmess.txt" \
            "https://raw.githubusercontent.com/soroushmirzaei/telegram-configs-collector/main/trojan.txt" \
            "https://raw.githubusercontent.com/soroushmirzaei/telegram-configs-collector/main/ss.txt" \
            "https://raw.githubusercontent.com/soroushmirzaei/telegram-configs-collector/main/hysteria2.txt" \
            "https://raw.githubusercontent.com/soroushmirzaei/telegram-configs-collector/main/tuic.txt" \
            "https://raw.githubusercontent.com/mrvcoder/V2rayCollector/main/vless.txt" \
            "https://raw.githubusercontent.com/swileran/v2ray-config-collector/main/vless.txt" \
            "https://raw.githubusercontent.com/swileran/v2ray-config-collector/main/vmess.txt" \
            "https://raw.githubusercontent.com/swileran/v2ray-config-collector/main/trojan.txt" \
            "https://raw.githubusercontent.com/swileran/v2ray-config-collector/main/hysteria2.txt" \
            "https://raw.githubusercontent.com/kort0881/sbornik-vless/main/vless.txt" \
            "https://raw.githubusercontent.com/ircfspace/tconfig/main/vless.txt" \
            "https://raw.githubusercontent.com/ircfspace/location/main/vless.txt" \
            "https://raw.githubusercontent.com/Ptech3/v2ray-configs/main/vless.txt" \
            "https://raw.githubusercontent.com/barry-far/V2ray-Configs/main/VLESS.txt" \
            "https://raw.githubusercontent.com/barry-far/V2ray-Configs/main/VMESS.txt" \
            "https://raw.githubusercontent.com/barry-far/V2ray-Configs/main/TROJAN.txt" \
            "https://raw.githubusercontent.com/aiboboxx/v2rayfree/main/vless" \
            "https://raw.githubusercontent.com/aiboboxx/v2rayfree/main/vmess" \
            "https://raw.githubusercontent.com/free-nodes/v2rayfree/main/vless.txt" \
            "https://raw.githubusercontent.com/free-nodes/v2rayfree/main/vmess.txt" \
            "https://raw.githubusercontent.com/pooyaRaki/V2Ray-Configs/main/vless.txt" \
            "https://raw.githubusercontent.com/zzysss/v2ray-config/main/vless.txt" \
            "https://raw.githubusercontent.com/ip-scanner/cloudflare/main/sub.txt" \
            "https://raw.githubusercontent.com/MortezaBashsiz/CFScanner/main/configs/sub.txt" \
            "https://raw.githubusercontent.com/vfarid/cf-workers/main/sub" \
            "https://raw.githubusercontent.com/miladrahmati/v2ray-configs/main/subscription.txt" \
            "https://raw.githubusercontent.com/Pridestalker/v2ray-config/main/vless.txt" \
            "https://raw.githubusercontent.com/Pridestalker/v2ray-config/main/vmess.txt" \
            "https://raw.githubusercontent.com/hamidh38n/V2Ray-Configs-Collector/main/vless.txt" \
            "https://raw.githubusercontent.com/hamidh38n/V2Ray-Configs-Collector/main/vmess.txt" \
            "https://raw.githubusercontent.com/hamidh38n/V2Ray-Configs-Collector/main/trojan.txt" \
            "https://raw.githubusercontent.com/ALIILAPRO/v2ray-configs/main/vless.txt" \
            "https://raw.githubusercontent.com/ALIILAPRO/v2ray-configs/main/vmess.txt" \
            "https://raw.githubusercontent.com/miladrahmati/v2ray-configs/main/vless.txt" \
            "https://raw.githubusercontent.com/miladrahmati/v2ray-configs/main/vmess.txt" \
            "https://raw.githubusercontent.com/miladrahmati/v2ray-configs/main/trojan.txt" \
            "https://raw.githubusercontent.com/amirhosseinchoghaei/Free-Configs/main/vless.txt" \
            "https://raw.githubusercontent.com/amirhosseinchoghaei/Free-Configs/main/vmess.txt" \
            "https://raw.githubusercontent.com/MrNimaX/free-config/main/vless.txt" \
            "https://raw.githubusercontent.com/salviol/v2ray-configs/main/vless.txt" \
            "https://raw.githubusercontent.com/hashiritakeru/v2ray-config/main/vless.txt" \
            "https://raw.githubusercontent.com/mahanmiradi/free-v2ray/main/vless.txt" \
            "https://raw.githubusercontent.com/mahanmiradi/free-v2ray/main/vmess.txt" \
            "https://raw.githubusercontent.com/saeidpyr/v2ray-free-configs/main/vless.txt" \
            "https://raw.githubusercontent.com/mortezaabedi2000/Free-config/main/v2ray.txt"
          do
            echo "Fetching $url"
            curl -sL "$url" >> all_configs.txt
          done
      - name: Keep only valid protocol lines
        run: |
          grep -E '^(vless://|vmess://|trojan://|ss://|tuic://|hysteria2://|hy2://|http?://|https?://)' all_configs.txt | sort -u > final.txt
      - name: Save to repository
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add final.txt
          git commit -m "auto update multi-protocol $(date)" || echo "no changes"
          git push
