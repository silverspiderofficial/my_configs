name: 'Smart VLESS Collector - Top Repos'

on:
  schedule:
    - cron: '*/30 * * * *'   # هر 30 دقیقه
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-vless:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: '🧹 Clean & Prepare Temp Files'
        run: |
          echo "" > all_configs_raw.txt

      - name: '🌐 Fetch from 15+ Popular VLESS Repositories'
        run: |
          echo "🚀 Starting to fetch VLESS configs from 15+ popular sources..."
          
          # لیست مخزن‌های به‌روز و پرطرفدار (بر اساس ستاره و فعالیت)
          for url in \
            "https://raw.githubusercontent.com/Epodonios/v2ray-configs/main/Splitted-By-Protocol/vless.txt" \
            "https://raw.githubusercontent.com/barry-far/V2ray-Configs/main/VLESS.txt" \
            "https://raw.githubusercontent.com/MahanKenway/Freedom-V2Ray/main/configs/vless.txt" \
            "https://raw.githubusercontent.com/free-nodes/v2rayfree/main/vless.txt" \
            "https://raw.githubusercontent.com/arshiafarzi/free-v2ray-config/main/vless.txt" \
            "https://raw.githubusercontent.com/soroushmirzaei/telegram-configs-collector/main/vless.txt" \
            "https://raw.githubusercontent.com/tepo80/v2rayNG_-/main/vless.txt" \
            "https://raw.githubusercontent.com/DukeMehdi/FreeList-V2ray-Configs/main/vless.txt" \
            "https://raw.githubusercontent.com/ALIILAPRO/v2ray-configs/main/vless.txt" \
            "https://raw.githubusercontent.com/Pridestalker/v2ray-config/main/vless.txt" \
            "https://raw.githubusercontent.com/hamidh38n/V2Ray-Configs-Collector/main/vless.txt" \
            "https://raw.githubusercontent.com/miladrahmati/v2ray-configs/main/vless.txt" \
            "https://raw.githubusercontent.com/amirhosseinchoghaei/Free-Configs/main/vless.txt" \
            "https://raw.githubusercontent.com/mahanmiradi/free-v2ray/main/vless.txt" \
            "https://raw.githubusercontent.com/saeidpyr/v2ray-free-configs/main/vless.txt" \
            "https://raw.githubusercontent.com/gfpcom/free-proxy-list/main/list/vless.txt"
          do
            echo "Fetching from $url"
            curl -sL "$url" >> all_configs_raw.txt || echo "⚠️ Skipping failed URL: $url"
          done

      - name: '🧹 Final Processing: Filter & Limit'
        run: |
          # فقط خطوط vless:// را نگه دار
          grep -E '^vless://' all_configs_raw.txt > filtered_vless.txt
          
          # حذف خطوط تکراری
          sort -u filtered_vless.txt > unique_vless.txt
          
          # تعداد نهایی را به 200 خط محدود کن (تازه‌ترین‌ها معمولاً آخر فایل هستند)
          tail -n 200 unique_vless.txt > final.txt
          
          # گزارش تعداد نهایی
          echo "✅ Total unique VLESS configs collected: $(wc -l < final.txt)"

      - name: '💾 Commit & Push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add final.txt
          if git diff --staged --quiet; then
            echo "✅ No new configs found, no commit needed."
          else
            git commit -m "✨ Auto-update VLESS configs $(date +'%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push origin HEAD:${{ github.ref_name }}
            echo "✅ Configs updated successfully!"
          fi
